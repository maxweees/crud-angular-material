<div fxlayout="row" fxLayoutAlign="center">
    <div fxlayout="columum" fxFlex="900px">
        <form class="mt-60" #clientesFrm="ngForm" (ngSubmit)="salvar()">
            <mat-card appearance="outlined">
                <mat-card-header >
                    <mat-card-title>Dados Pessoais</mat-card-title>
                </mat-card-header>
                <mat-card-content class="mt-20"  >
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="800px">
                            <mat-form-field class="full-width">
                            <mat-label>Nome *</mat-label>
                            <input
                            type="text"
                            name="nome"
                            [(ngModel)]="cliente.nome"
                            placeholder="Jose da Silva*"
                            matInput/>
                            </mat-form-field>
                        </div>
                    </div>
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="800px">
                            <mat-form-field class="full-width">
                            <mat-label>E-mail*</mat-label>
                            <input
                            type="text"
                            name="email"
                            [(ngModel)]="cliente.email"
                            placeholder="Jose@gmail.com *"
                            matInput/>
                            </mat-form-field>
                        </div>
                    </div>
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="400px">
                            <mat-form-field class="full-width">
                            <mat-label>CPF *</mat-label>
                            <input
                            type="text"
                            name="cpf"
                            mask="000.000.000-00"
                            [(ngModel)]="cliente.cpf"
                            placeholder="123.***.***-**"
                            matInput/>
                            </mat-form-field>
                        </div>
                    </div>
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="400px">
                            <mat-form-field class="full-width" >
                            <mat-label>Data de Nascimento *</mat-label>
                            <input
                            type="text"
                            name="dataNascimento"
                            mask="00/00/0000"
                            [(ngModel)]="cliente.dataNascimento"
                            placeholder="01/01/1900*"
                            matInput/>
                            </mat-form-field>
                        </div>
                    </div>
                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="400px">
                            <mat-form-field class="full-width" >
                            <mat-label>UF *</mat-label>
                            <mat-select [(value)]="cliente.uf" 
                                        (selectionChange)="carregarMunicipios($event)">
                                <mat-option *ngFor="let uf of estados" [value]="uf.sigla">
                                    {{uf.sigla}}

                                </mat-option>
                            </mat-select>
                            </mat-form-field>
                        </div>
                    </div>

                    <div fxLayout="row" fxLayoutAlign="start" fxLayoutGap="16px">
                        <div fxLayout="column" fxFlex="400px">
                            <mat-form-field class="full-width" >
                            <mat-label>Cidade *</mat-label>
                            <mat-select [(value)]="cliente.municipio" >
                                <mat-option *ngFor="let m of municipios" [value]="m.nome">
                                    {{m.nome}}
                                </mat-option>
                            </mat-select>
                            </mat-form-field>
                        </div>
                    </div>
                </mat-card-content>
                <mat-card-actions>
                    @if(!atualizando){
                    <button mat-flat-button color="primary" type="submit">
                        <mat-icon fontIcon="save"></mat-icon>
                        Salvar
                    </button>
                }@else{
                    <button mat-flat-button color="primary" type="submit">
            
                        <mat-icon fontIcon="refresh"></mat-icon>
                        Atualizar
                    </button>
                }
                    <button mat-flat-button color="accent" class="ml-5">
                        <mat-icon fontIcon="backspace"></mat-icon>
                        Limpar
                    </button>
                </mat-card-actions>
            </mat-card>
        </form>
    </div>
</div>
